name: Release to NPM

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - dev
      - "releases/**"

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
      - uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm build:prepare
      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          title: ${{ format('chore({0}){1} bump packages version', github.ref_name, ':') }}
          commit: ${{ format('chore({0}){1} bump packages version', github.ref_name, ':') }}
          version: pnpm dlx @changesets/cli@2.31.0 version
          publish: pnpm dlx @changesets/cli@2.31.0 publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
